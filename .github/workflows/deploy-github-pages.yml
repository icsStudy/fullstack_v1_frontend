# פריסת ה-frontend הסטטי ל-GitHub Pages (GitHub Actions + Pages artifact API)
#
# הגדרה חד-פעמית ב-GitHub:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# אופציונלי — כתובת ה-API בפרודקשן:
#   Settings → Secrets and variables → Actions → Variables → New repository variable
#   Name: API_BASE_URL   Value: https://your-api.example.com

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          mkdir -p _site
          cp -r css js *.html _site/
          if [ -n "$API_BASE_URL" ]; then
            sed -i "s|const API_BASE_URL = '[^']*'|const API_BASE_URL = '${API_BASE_URL}'|" _site/js/config.js
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
