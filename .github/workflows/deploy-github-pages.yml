# פריסת ה-frontend הסטטי ל-GitHub Pages
#
# הגדרה חד-פעמית ב-GitHub (אחרי הרצת workflow מוצלחת ראשונה):
#   Settings → Pages → Build and deployment
#   Source: "Deploy from a branch"
#   Branch: gh-pages   Folder: / (root)
#
# אם Pages עדיין לא מופעל: באותו מסך לחץ "Enable" / הגדר את האתר לפעם הראשונה.
#
# אופציונלי — כתובת ה-API בפרודקשן:
#   Settings → Secrets and variables → Actions → Variables
#   Name: API_BASE_URL   Value: https://your-api.example.com

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          mkdir -p _site
          cp -r css js *.html _site/
          if [ -n "$API_BASE_URL" ]; then
            sed -i "s|const API_BASE_URL = '[^']*'|const API_BASE_URL = '${API_BASE_URL}'|" _site/js/config.js
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
